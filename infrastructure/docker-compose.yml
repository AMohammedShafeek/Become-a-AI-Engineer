services:

  postgres:
    image: postgres:17
    container_name: postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: learning_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data 

  redis:
    image: redis:8
    container_name: redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: